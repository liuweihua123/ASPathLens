name: Update ASPathLens Data

on:
  schedule:
    - cron: "0 18 1 * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: python backend/scripts/update_all.py
        continue-on-error: true